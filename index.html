<!-- Просмотр статистики реквизитов UZCARD — только сводка, без номеров карт -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Статистика реквизитов — UZCARD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--bg:#eef0f7;--panel:#fff;--ink:#2b2f3a;--muted:#8a90a2;--line:#e7e9f1;--blue:#3b62f0;--blue-soft:#eaefff;--green:#2fb866;--green-soft:#e7f8ee;--amber:#e6952a;--amber-soft:#fdf3e3;--shadow:0 1px 2px rgba(30,40,80,.04),0 8px 24px rgba(30,40,80,.06);--radius:16px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.45}
  .wrap{max-width:1220px;margin:0 auto;padding:22px 18px 60px}
  .titlebar{background:var(--panel);border-radius:22px;box-shadow:var(--shadow);padding:20px 26px;text-align:center;margin-bottom:14px}
  .titlebar h1{margin:0;font-size:23px}.titlebar .sub{color:var(--muted);margin-top:4px;font-size:13px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .tabs{display:inline-flex;background:var(--panel);border-radius:12px;padding:4px;box-shadow:var(--shadow);border:1px solid var(--line);flex-wrap:wrap}
  .tab{padding:8px 15px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted)}
  .tab.active{background:var(--blue);color:#fff}
  .spacer{flex:1}.stamp{color:var(--muted);font-size:12px}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 13px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow)}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
  .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 18px;border:1px solid var(--line)}
  .card .lbl{color:var(--muted);font-size:12px;font-weight:600}.card .val{font-size:27px;font-weight:800;margin-top:6px}
  .val.blue{color:var(--blue)}.val.green{color:var(--green)}.val.amber{color:var(--amber)}.val.ink{color:var(--ink)}
  .panel{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:18px 20px;margin-bottom:16px}
  .panel h2{margin:0 0 4px;font-size:15px}.panel .h-sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}td.l,th.l{text-align:left}
  th{color:var(--muted);font-weight:600;font-size:12px;position:sticky;top:0;background:var(--panel)}
  .scroll{max-height:360px;overflow:auto;border-radius:10px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .pill.u{background:var(--green-soft);color:var(--green)}.pill.r{background:var(--amber-soft);color:var(--amber)}
  .mono{font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .empty{padding:40px;text-align:center;color:var(--muted)}.empty b{color:var(--ink)}
  .empty code{background:var(--blue-soft);color:var(--blue);padding:2px 7px;border-radius:6px;font-weight:700}
  @media(max-width:860px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>

<div class="wrap">
  <div class="titlebar">
    <h1>Статистика реквизитов — UZCARD</h1>
    <div class="sub" id="subline">Реквизиты, полученные при оформлении заявки на платёж, без проведения оплаты.</div>
  </div>
  <div class="toolbar">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="P2P">Сбор реквизитов</div>
      <div class="tab" data-tab="KZ">Контрольная закупка</div>
      <div class="tab" data-tab="OVERVIEW">Обзор</div>
    </div>
    <div class="spacer"></div>
    <span class="stamp" id="stamp">загрузка…</span>
    <button class="btn" id="refresh">Обновить</button>
  </div>
  <div id="view"><div class="panel"><div class="empty">Загрузка данных…</div></div></div>
</div>

<script>
const CATS=['KZ','P2P'];
const CAT_LABEL={KZ:'Контрольная закупка',P2P:'Сбор реквизитов'};
const CAT_SHORT={KZ:'Контрольная закупка',P2P:'Сбор реквизитов'};
const CAT_DESC={P2P:'Реквизиты, полученные при оформлении заявки на платёж, без проведения оплаты.',KZ:'Реквизиты, подтверждённые фактическим платежом.',OVERVIEW:'Сводка по обоим разделам.'};
let DATA=null,currentTab='P2P',chart=null;

function fmt(n){return (n||0).toLocaleString('ru-RU');}
function pad(n){return String(n).padStart(2,'0');}
function ruDate(iso){if(!iso)return '—';const p=iso.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function addDays(iso,n){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function cardEl(l,v,c){return `<div class="card"><div class="lbl">${l}</div><div class="val ${c||'ink'}">${v}</div></div>`;}
function winSum(t,from){let s={total:0,unique:0,repeated:0};for(const d of t.dates){if(from&&d<from)continue;const x=t.perDate[d];s.total+=x.total;s.unique+=x.unique;s.repeated+=x.repeated;}return s;}
function breakdownPanel(title,list,records){let h=`<div class="panel"><h2>${title}</h2><div class="h-sub">записей всего: ${fmt(records)}</div><div class="scroll"><table><thead><tr><th class="l">Название</th><th>Записей</th><th>Уник. карт</th></tr></thead><tbody>`;
  (list||[]).slice(0,15).forEach(x=>h+=`<tr><td class="l">${x.name}</td><td class="mono">${fmt(x.records)}</td><td class="mono">${fmt(x.cards)}</td></tr>`);
  if(!list||!list.length)h+=`<tr><td class="l" colspan="3" style="color:var(--muted)">нет данных</td></tr>`;return h+`</tbody></table></div></div>`;}

function renderCat(cat){
  const t=DATA.cats&&DATA.cats[cat];
  if(!t||!t.dates||!t.dates.length)return `<div class="panel"><div class="empty"><b>Нет данных: ${CAT_LABEL[cat]}.</b></div></div>`;
  const day=t.perDate[t.ref]||{total:0,unique:0,repeated:0};
  const week=winSum(t,addDays(t.ref,-6)),month=winSum(t,addDays(t.ref,-29));
  let html=`<div class="cards">
    ${cardEl('Реквизитов за '+ruDate(t.ref),fmt(day.total),'blue')}
    ${cardEl('Уникальных за дату',fmt(day.unique),'green')}
    ${cardEl('Повторных за дату',fmt(day.repeated),'amber')}
    ${cardEl('Всего уникальных карт',fmt(t.distinct),'blue')}
  </div>
  <div class="cards">
    ${cardEl('За неделю — всего',fmt(week.total),'ink')}
    ${cardEl('За неделю — уникальных',fmt(week.unique),'green')}
    ${cardEl('За месяц — всего',fmt(month.total),'ink')}
    ${cardEl('За месяц — уникальных',fmt(month.unique),'green')}
  </div>`;
  html+=`<div class="grid2">
    <div class="panel"><h2>Динамика по датам — ${CAT_SHORT[cat]}</h2><div class="h-sub">уникальные (новые карты) и повторные по дням</div><div style="position:relative;height:260px;width:100%"><canvas id="chart"></canvas></div></div>
    <div class="panel"><h2>Сводка по датам</h2><div class="h-sub">повторов всего: ${fmt(t.total-t.distinct)} · доля повторов: ${t.total?Math.round(1000*(t.total-t.distinct)/t.total)/10:0}%</div>
      <div class="scroll"><table><thead><tr><th>Дата</th><th>Всего</th><th>Уник.</th><th>Повт.</th></tr></thead><tbody>`;
  [...t.dates].reverse().forEach(d=>{const x=t.perDate[d];
    html+=`<tr><td>${ruDate(d)}</td><td class="mono">${fmt(x.total)}</td><td class="mono"><span class="pill u">${fmt(x.unique)}</span></td><td class="mono"><span class="pill r">${fmt(x.repeated)}</span></td></tr>`;});
  html+=`</tbody></table></div></div></div>`;
  html+=`<div class="grid2">${breakdownPanel('По банкам',t.banks,t.total)}${breakdownPanel('По БК / казино',t.casinos,t.total)}</div>`;
  return html;
}
function renderOverview(){let html='<div class="grid2">';
  CATS.forEach(cat=>{const t=DATA.cats&&DATA.cats[cat];const day=(t&&t.perDate&&t.perDate[t.ref])||{unique:0,repeated:0};
    html+=`<div class="panel"><h2>${CAT_LABEL[cat]}</h2><div class="h-sub">${t&&t.dates&&t.dates.length?('данные до '+ruDate(t.ref)):'нет данных'}</div>
      <div class="cards" style="grid-template-columns:1fr 1fr;margin-bottom:0">
        ${cardEl('Всего записей',fmt(t?t.total:0),'ink')}
        ${cardEl('Уникальных карт',fmt(t?t.distinct:0),'blue')}
        ${cardEl('Уникальных за дату',fmt(day.unique),'green')}
        ${cardEl('Повторных за дату',fmt(day.repeated),'amber')}
      </div></div>`;});
  return html+'</div>';}
function drawChart(cat){const t=DATA.cats&&DATA.cats[cat],el=document.getElementById('chart');if(!el||typeof Chart==='undefined'||!t)return;
  const last=t.dates.slice(-30);if(chart){chart.destroy();chart=null;}
  chart=new Chart(el,{type:'bar',data:{labels:last.map(ruDate),datasets:[
    {label:'Уникальные',data:last.map(d=>t.perDate[d].unique),backgroundColor:'#2fb866',borderRadius:4,maxBarThickness:22},
    {label:'Повторные',data:last.map(d=>t.perDate[d].repeated),backgroundColor:'#3b62f0',borderRadius:4,maxBarThickness:22}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,resizeDelay:120,plugins:{legend:{position:'bottom',labels:{boxWidth:12}}},scales:{x:{grid:{display:false},ticks:{autoSkip:true,maxRotation:60}},y:{beginAtZero:true,grid:{color:'#eef0f7'}}}}});}
function render(){const sl=document.getElementById('subline');if(sl)sl.textContent=CAT_DESC[currentTab]||'';
  const v=document.getElementById('view');
  if(!DATA){v.innerHTML='<div class="panel"><div class="empty"><b>Данные ещё не опубликованы.</b><br>Загрузите на хостинг файл <code>stats.json</code> рядом с этой страницей.</div></div>';return;}
  if(currentTab==='OVERVIEW'){v.innerHTML=renderOverview();return;}
  v.innerHTML=renderCat(currentTab);drawChart(currentTab);}
async function load(){const st=document.getElementById('stamp');
  try{const r=await fetch('stats.json?t='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('нет файла ('+r.status+')');
    DATA=await r.json();const g=DATA.generatedAt?new Date(DATA.generatedAt):null;
    st.textContent=g?('обновлено: '+ruDate(g.toISOString().slice(0,10))+' '+pad(g.getHours())+':'+pad(g.getMinutes())):'обновлено';
  }catch(e){DATA=null;st.textContent='данные не найдены';}
  render();}
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');currentTab=t.dataset.tab;render();});
document.getElementById('refresh').addEventListener('click',load);
load();setInterval(load,300000);
</script>
